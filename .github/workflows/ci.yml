name: CI

on:
  push:
    branches: [ "main", "fix/*", "feature/*" ]
  pull_request:
    branches: [ "main" ]

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-deny

      - name: Run cargo audit (dependency vulnerabilities)
        run: cargo audit
        working-directory: src-tauri

      - name: Run cargo deny (licenses + advisories + sources)
        run: cargo deny check
        working-directory: src-tauri

  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev

      - name: Build
        run: cargo build --release
        working-directory: src-tauri

      - name: Run tests
        run: cargo test --release
        working-directory: src-tauri

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify Cargo.lock is committed
        run: test -f src-tauri/Cargo.lock && echo "Cargo.lock is committed"

      - name: Check Cargo.lock is up to date
        run: cargo generate-lockfile && git diff --exit-code src-tauri/Cargo.lock
        working-directory: src-tauri
