# cargo-deny configuration
# See https://embarkstudios.github.io/cargo-deny/ for details

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
unsound = "deny"
yanked = "warn"
severity-threshold = "low"
ignore = []

[licenses]
unlicensed = "deny"
allow-osi-fsf-free = "neither"
confidence-threshold = 0.8
deny = []
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
]

[[licenses.clarify]]
name = "adler32"
expression = "Zlib"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
